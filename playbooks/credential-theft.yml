playbook_id: credential-theft
title: Credential Theft via LSASS Memory Access
severity: high
summary: >
    Detects attempts to read or dump LSASS process memory to harvest cached
    credentials, NTLM hashes, and Kerberos tickets -- the most common
    technique for stealing plaintext or hashed Windows credentials from a
    compromised host.
attack_techniques:
    - T1003.001
    - T1218.011
related_rules:
    - proc_access_lsass_memory_read
    - proc_creation_lsass_dump_comsvcs
alert_aliases:
    - lsass dump
    - lsass memory access
    - mimikatz sekurlsa::minidump
    - comsvcs minidump
    - procdump lsass

triage:
    - Identify the source process (SrcProc/Image) and the account it ran as; note whether it's a known admin/EDR/AV process or an unexpected binary.
    - Confirm the target process is genuinely lsass.exe (PID/GUID match), not a false-positive overlap in the access mask.
    - Check whether a dump file was written to disk around the same timestamp (search for .dmp files, or comsvcs.dll rundll32 invocations on that host).
    - Determine if this host is a Domain Controller or holds Tier-0 credentials -- this significantly escalates urgency.

investigation:
    - "Pull the full process tree for the source process: parent process, command line, loaded modules, and code-signing status."
    - "Search EVTX/EDR telemetry on the host for related indicators in the surrounding 15 minutes: new process creation with dump-related keywords (procdump, comsvcs, MiniDump, rundll32), suspicious PowerShell, or credential-dumping tool file drops."
    - Check for outbound network connections or file transfers from the host shortly after the access event -- attackers typically exfiltrate the dump for offline cracking.
    - Identify every account with an active session on the host at the time of access; treat those credentials as potentially compromised.
    - Search other hosts for the same source binary hash or command-line pattern to scope lateral spread.

containment:
    - Isolate the affected host from the network (EDR isolation or network ACL) pending investigation.
    - Kill the identified malicious process if still running; preserve a memory/process dump for forensics before doing so if feasible.
    - Disable or force-expire any local/domain accounts confirmed active on the host at the time of access.
    - If the host is a Domain Controller, treat this as a full domain-compromise scenario and engage incident leadership immediately.

eradication:
    - Remove the dropped tooling (dumper binary, dump files) and any persistence mechanisms established by the same intrusion (scheduled tasks, services, registry Run keys).
    - Patch or reconfigure the initial access vector that allowed the attacker to reach this host (e.g. phishing payload, exposed RDP, exploited service).
    - Force credential resets for every account exposed on the host, prioritized by privilege level (Domain Admins and service accounts first).

recovery:
    - Re-image the host if the actor achieved SYSTEM/admin-level access and full remediation confidence isn't achievable through cleanup alone.
    - Rotate krbtgt and any golden-ticket-relevant secrets if there's any indication the attacker escalated to domain-level compromise.
    - Re-enable network connectivity only after confirming no residual persistence and after credential rotation is complete.

false_positives:
    - Endpoint security products (AV/EDR) and Sysinternals-family tools (procexp, procmon, taskmgr) routinely open handles to LSASS with broad access rights -- confirm the source binary before escalating.
    - Backup/agent software that legitimately reads process memory for security scanning.

escalation_criteria:
    - Any successful memory dump (not just an access attempt), confirmed via a written .dmp file or a process handle with full read access.
    - The affected host is a Domain Controller, certificate authority, or other Tier-0 asset.
    - Evidence the dumped credentials were used elsewhere (correlate with pass-the-hash or unusual logon activity on other hosts).

references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://attack.mitre.org/techniques/T1218/011/
