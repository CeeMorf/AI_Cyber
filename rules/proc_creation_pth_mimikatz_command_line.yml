title: Pass-the-Hash Command Line Activity (Mimikatz sekurlsa::pth)
id: 3a2cb6f7-658e-44d6-93f6-7bebd74f4e0f
status: test
description: |
    Detects command-line arguments consistent with Mimikatz's sekurlsa::pth module,
    which spawns a new process under a legitimate user context using only an NTLM
    hash, without requiring the plaintext password.
references:
    - https://attack.mitre.org/techniques/T1550/002/
    - https://github.com/gentilkiwi/mimikatz
author: mcp-hayabusa sample rules
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1550.002
    - attack.credential-access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    process_creation:
        EventID: 4688
        Channel: Security
    selection_command:
        CommandLine|contains: 'sekurlsa::pth'
    selection_args:
        CommandLine|contains|all:
            - '/user:'
            - '/ntlm:'
            - '/run:'
    condition: process_creation and (selection_command or selection_args)
falsepositives:
    - Unlikely; these argument combinations are not used by legitimate administrative tools
test_cases:
    - description: Mimikatz sekurlsa::pth invocation with all three required args
      should_match: true
      sample_fields:
          EventID: 4688
          Channel: Security
          CommandLine: 'mimikatz.exe "sekurlsa::pth /user:admin /ntlm:<hash> /run:cmd.exe"'
    - description: "net use with a /user: argument but no /ntlm:, /run:, or sekurlsa::pth marker"
      should_match: false
      sample_fields:
          EventID: 4688
          Channel: Security
          CommandLine: net use \\fileserver\share /user:admin Passw0rd!
level: critical
ruletype: Sigma
