title: Possible Pass-the-Hash Activity Via Anomalous NTLM Logon
id: d21c002f-861d-4098-b26d-f9294702c6d3
status: test
description: |
    Detects a network logon (Type 3) authenticating via NTLM where the reported
    Logon Process is NtLmSsp and the Key Length is 0. A zero Key Length combined
    with NTLM authentication over a network logon is a strong indicator that the
    authentication was performed by replaying a password hash directly, rather than
    an interactive password entry, characteristic of Pass-the-Hash tooling.
references:
    - https://attack.mitre.org/techniques/T1550/002/
    - https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4624
author: mcp-hayabusa sample rules
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1550.002
logsource:
    product: windows
    service: security
detection:
    security:
        Channel: Security
    selection:
        EventID: 4624
        LogonType: 3
        AuthenticationPackageName: NTLM
        LogonProcessName: NtLmSsp
        KeyLength: 0
    filter_anonymous:
        TargetUserName: ANONYMOUS LOGON
    filter_machine_accounts:
        TargetUserName|endswith: $
    condition: security and (selection and not 1 of filter_*)
falsepositives:
    - Some legacy applications and appliances authenticate this way by design; baseline before alerting
test_cases:
    - description: Network logon with NTLM/NtLmSsp and zero Key Length for a regular user account
      should_match: true
      sample_fields:
          EventID: 4624
          Channel: Security
          LogonType: 3
          AuthenticationPackageName: NTLM
          LogonProcessName: NtLmSsp
          KeyLength: 0
          TargetUserName: jsmith
    - description: Same NTLM/zero-Key-Length pattern for a machine account logon, excluded by filter_machine_accounts
      should_match: false
      sample_fields:
          EventID: 4624
          Channel: Security
          LogonType: 3
          AuthenticationPackageName: NTLM
          LogonProcessName: NtLmSsp
          KeyLength: 0
          TargetUserName: WORKSTATION01$
level: high
ruletype: Sigma
