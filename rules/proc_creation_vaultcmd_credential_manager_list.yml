title: Windows Credential Manager Credential Theft via VaultCmd
id: c0787b5f-e60d-43f6-a573-1e7b332fb5bd
status: test
description: |
    Detects use of the native Windows utility vaultcmd.exe with the /listcreds:
    flag to enumerate stored Windows Credential Manager entries (saved RDP,
    network share, and web credentials). This is a living-off-the-land
    technique for stealing cached credentials without dropping a dedicated
    dumping tool. Severity is high rather than critical: vaultcmd.exe has no
    everyday administrative workflow, but a help-desk credential-troubleshooting
    session or a profile-migration script could plausibly invoke it in a
    narrow, explainable way (see falsepositives), so it isn't an unconditional
    compromise indicator the way e.g. Pass-the-Hash syntax is.
references:
    - https://attack.mitre.org/techniques/T1555/004/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1555.004/T1555.004.md#atomic-test-1---access-saved-credentials-via-vaultcmd
author: mcp-hayabusa sample rules
date: 2026-07-14
modified: 2026-07-14
tags:
    - attack.credential-access
    - attack.t1555.004
logsource:
    category: process_creation
    product: windows
detection:
    process_creation:
        EventID: 4688
        Channel: Security
    selection_image:
        Image|endswith: \VaultCmd.exe
    selection_args:
        CommandLine|contains: '/listcreds:'
    condition: process_creation and (all of selection_*)
falsepositives:
    - Help-desk troubleshooting of a user's saved RDP/network credentials via vaultcmd (should be tied to a known support ticket)
    - User-profile migration or backup tooling that enumerates vault entries prior to a profile transfer
test_cases:
    - description: vaultcmd.exe used to list all stored Windows credentials
      should_match: true
      sample_fields:
          EventID: 4688
          Channel: Security
          Image: C:\Windows\System32\vaultcmd.exe
          CommandLine: 'vaultcmd.exe /listcreds:"Windows Credentials" /all'
    - description: vaultcmd.exe used only to list vault schemas, without the /listcreds credential-dump flag
      should_match: false
      sample_fields:
          EventID: 4688
          Channel: Security
          Image: C:\Windows\System32\vaultcmd.exe
          CommandLine: 'vaultcmd.exe /list'
level: high
ruletype: Sigma
