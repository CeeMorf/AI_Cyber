hosts:
    - hostname: DC01
      role: Domain Controller
      criticality: tier0
      ip: 10.0.0.10
      os: Windows Server 2022
      owner: IT Infrastructure
      notes: Primary domain controller for CORP.LOCAL; holds krbtgt.
    - hostname: DC02
      role: Domain Controller
      criticality: tier0
      ip: 10.0.0.11
      os: Windows Server 2022
      owner: IT Infrastructure
      notes: Secondary domain controller; replication partner of DC01.
    - hostname: FS01
      role: File Server
      criticality: tier1
      ip: 10.0.1.20
      os: Windows Server 2022
      owner: IT Infrastructure
      notes: Hosts department file shares, including sensitive HR/Finance data.
    - hostname: SQL01
      role: Database Server
      criticality: tier1
      ip: 10.0.1.30
      os: Windows Server 2022
      owner: Database Team
      notes: Hosts the primary business application's database.
    - hostname: WEB01
      role: Web/Application Server
      criticality: tier1
      ip: 10.0.1.40
      os: Windows Server 2022
      owner: Application Team
      notes: Internet-facing reverse proxy backend; DMZ-adjacent.
    - hostname: JMP01
      role: Administrative Jump Host
      criticality: tier1
      ip: 10.0.0.50
      os: Windows Server 2022
      owner: IT Infrastructure
      notes: Only host IT admins are expected to run credential/LSASS-adjacent tooling from.
    - hostname: WKS-*
      role: Standard Workstation
      criticality: tier2
      ip: 10.0.10.0/24
      os: Windows 11
      owner: End User Support
      notes: General employee workstation fleet, naming pattern WKS-<asset-tag>.
